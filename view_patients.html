<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
</head>
<body>

<h2>Patient List</h2>

<table border="1" cellpadding="10">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for p in patients %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>

<td>

<a href="/update_patient/{{ p[0] }}">
Update
</a>

|

<a href="/delete_patient/{{ p[0] }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">
    Home
</a>

</body>
</html>
