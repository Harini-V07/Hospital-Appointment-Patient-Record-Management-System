<!DOCTYPE html>
<html>

<head>

<title>Search Patient</title>

<style>

body{
font-family:Arial;
margin:40px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>Search Patient</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Enter Patient Name"
>

<button>
Search
</button>

</form>

{% if patient %}

<h3>Result</h3>

<p>ID : {{ patient[0] }}</p>
<p>Name : {{ patient[1] }}</p>
<p>Age : {{ patient[2] }}</p>
<p>Gender : {{ patient[3] }}</p>
<p>Phone : {{ patient[4] }}</p>

{% endif %}

</body>
</html>
