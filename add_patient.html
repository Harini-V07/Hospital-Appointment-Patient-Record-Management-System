<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
</head>
<body>

<h2>Add Patient</h2>

<form method="POST">

    Name:
    <input type="text" name="name" required>
    <br><br>

    Age:
    <input type="number" name="age" required>
    <br><br>

    Gender:
    <select name="gender">

        <option>Male</option>

        <option>Female</option>

    </select>

    <br><br>

    Phone:
    <input type="text" name="phone" required>

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
